# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: read

jobs:
  wait_for_ci:
    name: ⏳ Wait for CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for Quality Gates to pass
        uses: lewagon/wait-on-check-action@1d57e2c51a58d812d2765e036a028b6bdb5a6154 # v1.8.1
        with:
          ref: ${{ github.sha }}
          check-name: 'E2E Tests (Playwright)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          checks-discovery-timeout: 900

  deploy_rules:
    name: 🔒 Deploy Firestore Rules + Indexes
    runs-on: ubuntu-latest
    needs: wait_for_ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools@15.23.0

      - name: Deploy Firestore Rules and Indexes
        # Deploys firestore.rules + firestore.indexes.json — never hosting or functions.
        # Runs after CI (which includes test:rules against the emulator) to ensure
        # local rules and indexes are always in sync with production.
        # Uses the same service account already trusted for hosting deploys.
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUANTUM_FINANCE_39235 }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            firebase deploy --only firestore:rules,firestore:indexes --project quantum-finance-39235 --non-interactive
          rm -f /tmp/sa.json

  deploy_functions:
    name: ⚙️ Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: wait_for_ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools@15.23.0

      - name: Install & build functions
        # Instala e compila o codebase de functions (TS -> functions/lib) antes do deploy.
        # Não toca em src/ nem em firestore.rules.
        run: |
          npm --prefix functions ci
          npm --prefix functions run build

      - name: Deploy Cloud Functions
        # Publica SOMENTE as Cloud Functions — nunca hosting ou firestore.rules.
        # Roda após o gate de CI (wait_for_ci), em paralelo aos jobs de rules/hosting,
        # como job separado para deixar claro o que falhou em caso de erro.
        #
        # Reutiliza o MESMO service account já confiável para hosting/rules
        # (secret FIREBASE_SERVICE_ACCOUNT_QUANTUM_FINANCE_39235). NÃO cria secret novo.
        #
        # IAM necessário no service account (gen-2 / Node 24) — se faltar, o deploy
        # falha explicitamente abaixo e o gap NÃO deve ser contornado:
        #   - roles/cloudfunctions.developer  (Cloud Functions Developer)
        #   - roles/iam.serviceAccountUser    (Service Account User — atuar como SA de runtime)
        #   - roles/firebase.admin            (Firebase Admin — ou equivalente)
        #   2nd gen também costuma exigir: roles/run.admin, roles/artifactregistry.writer,
        #   roles/cloudbuild.builds.editor.
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUANTUM_FINANCE_39235 }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "::error::Secret FIREBASE_SERVICE_ACCOUNT_QUANTUM_FINANCE_39235 ausente — deploy de functions abortado."
            exit 1
          fi
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          # Garante remoção da credencial mesmo se o deploy falhar (set -e do runner).
          trap 'rm -f /tmp/sa.json' EXIT
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            firebase deploy --only functions --project quantum-finance-39235 --non-interactive || {
              echo "::error::Deploy de functions falhou. Verifique permissões IAM do service account (ver comentário acima: cloudfunctions.developer + iam.serviceAccountUser + firebase.admin). NÃO contornar o gap de IAM."
              exit 1
            }

  build_and_deploy:
    name: 🚀 Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: wait_for_ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build production
        env:
          VITE_ENABLE_AGENT_ROUTER: 'true'
        run: npm run build

      - name: Install Firebase Tools
        run: npm install -g firebase-tools@15.23.0

      - name: Deploy Firebase Hosting live
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUANTUM_FINANCE_39235 }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "::error::Secret FIREBASE_SERVICE_ACCOUNT_QUANTUM_FINANCE_39235 missing - live hosting deploy aborted."
            exit 1
          fi

          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          deploy_output="$(mktemp)"
          trap 'rm -f /tmp/sa.json "$deploy_output"' EXIT

          set +e
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            firebase deploy --only hosting --project quantum-finance-39235 --non-interactive >"$deploy_output" 2>&1
          deploy_code=$?
          set -e

          if [ "$deploy_code" -eq 0 ]; then
            cat "$deploy_output"
            exit 0
          fi

          if grep -q "is the current active version" "$deploy_output"; then
            cat "$deploy_output"
            echo "::warning::Firebase Hosting live already activated this version; treating idempotent FAILED_PRECONDITION as operational success."
            exit 0
          fi

          cat "$deploy_output"
          exit "$deploy_code"
