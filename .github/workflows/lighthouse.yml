# F-14 — Lighthouse CI em MODO RELATÓRIO (não-bloqueante).
# Mede Core Web Vitals (LCP/INP/CLS) em perfil MÓVEL e publica o relatório
# (temporary-public-storage). NÃO tem assertions que quebrem o build: é medição,
# não gate. Roda no push para main (baseline histórico) e sob demanda.
name: Lighthouse (report-only)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

# Cancela execuções antigas do mesmo ref para não acumular.
concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    # Build usa config Firebase fake (mesma do CI) — o app renderiza a tela de
    # login; medimos o carregamento inicial real da PWA.
    env:
      VITE_FIREBASE_API_KEY: fake-api-key
      VITE_FIREBASE_AUTH_DOMAIN: fake.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: fake-project
      VITE_FIREBASE_STORAGE_BUCKET: fake.appspot.com
      VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
      VITE_FIREBASE_APP_ID: "1:123456789:web:fake"
      VITE_USE_EMULATOR: "false"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lighthouse CI (mobile, report-only)
        continue-on-error: true
        run: npx --yes @lhci/cli@0.15.1 autorun
