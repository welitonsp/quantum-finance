name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VITE_FIREBASE_API_KEY: fake-api-key
      VITE_FIREBASE_AUTH_DOMAIN: fake.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: fake-project
      VITE_FIREBASE_STORAGE_BUCKET: fake.appspot.com
      VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
      VITE_FIREBASE_APP_ID: "1:123456789:web:fake"
      VITE_USE_EMULATOR: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: firebase-emulators-${{ runner.os }}-

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm run test -- --run

      - name: Firestore Rules Tests
        run: npm run test:rules

      - name: Coverage
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Bundle budget check
        run: npm run bundlecheck

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Functions Security Audit (deny moderate+)
        working-directory: functions
        run: npm audit --audit-level=moderate

      - name: Functions Tests
        working-directory: functions
        run: npm test

      - name: Functions Build
        working-directory: functions
        run: npm run build

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    env:
      VITE_FIREBASE_API_KEY: fake-api-key
      VITE_FIREBASE_AUTH_DOMAIN: fake.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: demo-quantum-finance
      VITE_FIREBASE_STORAGE_BUCKET: fake.appspot.com
      VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
      VITE_FIREBASE_APP_ID: "1:123456789:web:fake"
      VITE_USE_EMULATOR: "true"
      # Valor dummy só para o emulador de functions não bloquear pedindo o secret
      # (defineSecret('GEMINI_API_KEY')). Nenhuma function invocada no E2E usa o valor;
      # `createTransaction` (callable do fluxo de criação) não lê o secret.
      GEMINI_API_KEY: "emulator-dummy-secret"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Build Cloud Functions (for functions emulator)
        run: |
          npm --prefix functions ci
          npm --prefix functions run build

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: firebase-emulators-${{ runner.os }}-

      - name: Download Firebase Emulator JARs
        run: firebase setup:emulators:firestore && firebase setup:emulators:auth || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        # Inclui o emulador de functions: o fluxo de criação de transação usa a callable
        # server-trusted `createTransaction`. Sem o emulador de functions o client batia
        # em 127.0.0.1:5001 com ERR_CONNECTION_REFUSED, tornando 02-transaction-create flaky.
        run: firebase emulators:exec --only auth,firestore,functions --project demo-quantum-finance "npm run test:e2e"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-report/
          retention-days: 7
