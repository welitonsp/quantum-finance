# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
#
# Manual override (2026-06-26) — fix(ci): repair Firebase Hosting preview authentication.
# The previous FirebaseExtended/action-hosting-deploy@v0 step failed at the
# OAuth2 token exchange:
#   "Failed to authenticate, have you run firebase login?"
#   "Invalid response body while trying to fetch oauth2 token ... premature close"
# The build itself passed; only the action's auth path was broken.
#
# Replaced with the SAME service-account auth pattern already proven on the merge
# workflow (jobs deploy_rules / deploy_functions): write the SA JSON to a temp
# file and point GOOGLE_APPLICATION_CREDENTIALS at it, then drive the firebase
# CLI directly. This reuses the EXISTING secret
# FIREBASE_SERVICE_ACCOUNT_QUANTUM_FINANCE_39235 — no new secret is introduced —
# and avoids the action's flaky oauth2 fetch.

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  contents: read
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build production
        run: npm run build

      - name: Install Firebase Tools
        # Usa "latest" (mesmo do workflow de merge, que autentica de forma confiável).
        # NÃO pinar 14.25.0: nessa versão a auth via GOOGLE_APPLICATION_CREDENTIALS
        # falhou no CI ("Failed to authenticate, have you run firebase login?").
        # Com "latest" a auth funciona; a instabilidade restante (rede do runner que
        # corta respostas — "premature close" — e leva a 409 no create do canal) é
        # absorvida pelo retry do passo de deploy.
        run: |
          npm install -g firebase-tools
          firebase --version

      - name: Deploy preview channel
        # Reuses the SAME service account already trusted for hosting/rules/functions
        # (secret FIREBASE_SERVICE_ACCOUNT_QUANTUM_FINANCE_39235). NO new secret.
        # Auth via GOOGLE_APPLICATION_CREDENTIALS — identical to the merge workflow,
        # which authenticates reliably — so it bypasses the broken oauth2 path in
        # action-hosting-deploy@v0. Preview channel TTL kept at 3d to stay under the
        # channel quota (see CLAUDE.md operational note).
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUANTUM_FINANCE_39235 }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "::error::Secret FIREBASE_SERVICE_ACCOUNT_QUANTUM_FINANCE_39235 ausente — preview de hosting abortado."
            exit 1
          fi
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/sa.json"
          # Garante remoção da credencial mesmo se o deploy falhar (set -e do runner).
          trap 'rm -f "$RUNNER_TEMP/sa.json"' EXIT
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"

          # Canal de preview ÚNICO por execução: "pr-<n>-<run_id>-<run_attempt>".
          # Um id fixo "pr-<n>" colide em re-runs (HTTP 409 "Channel already exists").
          # GITHUB_RUN_ID + GITHUB_RUN_ATTEMPT dão um id novo a cada execução E a cada
          # re-run da mesma execução. O TTL de 3d expira os canais antigos
          # automaticamente, evitando acúmulo permanente e estouro da cota de canais.
          # É sempre um canal de PREVIEW efêmero — nunca o "live".
          CHANNEL_ID="pr-${PR_NUMBER}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          # Retry da causa-raiz real: a rede do runner às vezes corta a resposta da
          # API de Hosting ("premature close"). Quando isso ocorre no create do canal,
          # o servidor cria o canal mas o cliente aborta; uma 2ª tentativa no MESMO id
          # encontra o canal já existente e apenas publica a versão (sem novo create),
          # então o 409 não se repete. O mesmo retry também absorve o "premature close"
          # na troca do token oauth2. Até 3 tentativas com espera curta.
          attempt=1
          max_attempts=3
          while true; do
            if firebase hosting:channel:deploy "$CHANNEL_ID" \
                 --project quantum-finance-39235 \
                 --expires 3d \
                 --non-interactive; then
              echo "Preview channel deploy bem-sucedido na tentativa $attempt."
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Deploy do canal de preview falhou após $max_attempts tentativas."
              exit 1
            fi
            echo "Tentativa $attempt falhou; aguardando 10s e tentando novamente..."
            attempt=$((attempt + 1))
            sleep 10
          done
