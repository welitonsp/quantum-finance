version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      frontend-production:
        dependency-type: production
        update-types:
          - patch
          - minor
      frontend-development:
        dependency-type: development
        update-types:
          - patch
          - minor

  - package-ecosystem: npm
    directory: "/functions"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      functions-production:
        dependency-type: production
        update-types:
          - patch
          - minor
      functions-development:
        dependency-type: development
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "11:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
